name: CI/CD Pipeline

# WHEN to run this pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # =============================
  # STAGE 1: BUILD
  # =============================
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Cache Maven dependencies (faster builds)
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Step 4: Compile the code
      - name: Build with Maven
        run: mvn -B compile -f E_Commerce_Website/pom.xml

  # =============================
  # STAGE 2: TEST
  # =============================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build  # runs AFTER build succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Run all unit, service, controller, and ATDD tests
      - name: Run tests
        run: mvn -B test -f E_Commerce_Website/pom.xml

      # Upload test results as artifact
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: E_Commerce_Website/target/surefire-reports/

  # =============================
  # STAGE 3: PACKAGE
  # =============================
  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test  # runs AFTER test succeeds

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      # Create JAR file (skip tests since they already passed)
      - name: Package JAR
        run: mvn -B package -DskipTests -f E_Commerce_Website/pom.xml

      # Save the JAR as a downloadable artifact
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: E_Commerce_Website/target/*.jar

  # =============================
  # STAGE 4: DOCKER (optional)
  # =============================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: package  # runs AFTER package succeeds
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: E_Commerce_Website/target/

      - name: Build Docker image
        run: docker build -t grocery-api:latest -f E_Commerce_Website/Dockerfile E_Commerce_Website/
