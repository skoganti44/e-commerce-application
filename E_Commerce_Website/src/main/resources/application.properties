# =====================
# PostgreSQL Connection
# =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommercedb
spring.datasource.username=postgres
spring.datasource.password=Disney@1701
spring.datasource.driver-class-name=org.postgresql.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# =====================
# JWT Authentication
# =====================
# IMPORTANT: change this secret before deploying. Must be >= 32 chars for HS256.
jwt.secret=ChangeThisToALongRandomStringAtLeast32CharsLong!!
# Token validity in milliseconds (86400000 = 24 hours)
jwt.expiration-ms=86400000
