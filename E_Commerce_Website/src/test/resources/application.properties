# =====================
# H2 In-Memory Database (for tests only)
# =====================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS public\\;SET SCHEMA public
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# =====================
# JPA / Hibernate
# =====================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# =====================
# JWT (test-only dummy values)
# =====================
jwt.secret=TestOnlySecretKeyMustBeAtLeast32CharsLong!!
jwt.expiration-ms=3600000

# =====================
# Activate "test" profile + skip Spring Security's default filter chain
# (our custom SecurityConfig is annotated @Profile("!test") so it also skips)
# =====================
spring.profiles.active=test
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
